services:
  moodle_escola_a:
    image: w3soft/moodle:2026.06.1-local
    container_name: moodle_escola_a
    restart: unless-stopped
    env_file:
      - ./secrets/escola-a.local.env
    volumes:
      - moodledata_escola_a:/var/www/moodledata
    networks:
      - moodle_net
    cpus: "1.0"
    mem_limit: 1.5g
    mem_reservation: 512m

  moodle_escola_b:
    image: w3soft/moodle:2026.06.1-local
    container_name: moodle_escola_b
    restart: unless-stopped
    env_file:
      - ./secrets/escola-b.local.env
    volumes:
      - moodledata_escola_b:/var/www/moodledata
    networks:
      - moodle_net
    cpus: "1.0"
    mem_limit: 1.5g
    mem_reservation: 512m

volumes:
  moodledata_escola_a:
    name: moodledata_escola_a
  moodledata_escola_b:
    name: moodledata_escola_b

networks:
  moodle_net:
    external: true
